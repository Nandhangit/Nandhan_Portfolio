    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
       body {
               font-family: 'Inter', sans-serif;
               background-color: #170209; /* Deep navy */
               color: #e5e7eb; /* Soft white */ 
               margin: 0;
               overflow-x: hidden;
               -webkit-font-smoothing: antialiased;
               -moz-osx-font-smoothing: grayscale;
               text-rendering: optimizeLegibility;
}

        
        /* Optimized Smooth Scrolling */
        html {
          scroll-behavior: smooth;
          scroll-padding-top: 80px;
        }

        .glass {
    background: rgba(2, 6, 23, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(56, 189, 248, 0.2);
}

        .text-gradient {
    background: linear-gradient(to right, #38bdf8, #2563eb);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.bg-gradient-accent {
    background: linear-gradient(to right, #38bdf8, #2563eb);
}

        .glow-border {
            position: relative;
            transform: translateZ(0);
        }
       .glow-border::after {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(45deg, #38bdf8, #2563eb);
    filter: blur(10px);
    z-index: -1;
    opacity: 0.6;
    border-radius: inherit;
}

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        
        /* Hardware accelerated components */
        .will-change-transform {
          will-change: transform, opacity;
        }

        /* Fast Section Transitions */
        section {
          transition: opacity 0.3s ease-in-out;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
          width: 8px;
        }
        ::-webkit-scrollbar-track {
  background: #020617;
}

::-webkit-scrollbar-thumb {
  background: #2563eb;
  border-radius: 10px;
  border: 2px solid #020617;
}

::-webkit-scrollbar-thumb:hover {
  background: #38bdf8;
}


        /* Perfect rounding for sections if requested as global style */
        .rounded-perfect {
          border-radius: 2rem;
        }

    </style>
